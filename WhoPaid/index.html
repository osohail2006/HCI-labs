<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitShare - Smart Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .category-chip.active {
            background-color: #4f46e5;
            color: white;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">

    <div id="app" class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-violet-600">
                    SplitShare
                </h1>
                <p class="text-slate-500">Track group expenses and settle up effortlessly.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="resetData()" class="px-4 py-2 text-sm font-medium text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition-colors">
                    <i class="fa-solid fa-rotate-right mr-2"></i>Reset
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Column: Setup & Inputs -->
            <div class="lg:col-span-7 space-y-6">
                
                <!-- Participants Card -->
                <section class="glass-card p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <i class="fa-solid fa-users mr-2 text-indigo-500"></i> Participants
                    </h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="personName" placeholder="Enter name..." 
                            class="flex-1 px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        <button onclick="addParticipant()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-medium hover:bg-indigo-700 transition-all shadow-md active:scale-95">
                            Add
                        </button>
                    </div>
                    <div id="participantList" class="flex flex-wrap gap-2">
                        <!-- Participants injected here -->
                    </div>
                </section>

                <!-- Add Expense Card -->
                <section class="glass-card p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 flex items-center">
                        <i class="fa-solid fa-receipt mr-2 text-indigo-500"></i> New Expense
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1">Description</label>
                            <input type="text" id="expenseDesc" placeholder="e.g. Dinner, AirBnB, Gas" 
                                class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1">Amount ($)</label>
                                <input type="number" id="expenseAmount" placeholder="0.00" 
                                    class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-600 mb-1">Who paid?</label>
                                <select id="payerSelect" class="w-full px-4 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                                    <option value="">Select person</option>
                                </select>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-2">Category</label>
                            <div class="flex flex-wrap gap-2" id="categorySelection">
                                <button onclick="selectCategory('food', this)" class="category-chip active px-4 py-2 rounded-xl border border-slate-200 text-sm flex items-center gap-2 transition-all">
                                    <i class="fa-solid fa-utensils"></i> Food
                                </button>
                                <button onclick="selectCategory('transport', this)" class="category-chip px-4 py-2 rounded-xl border border-slate-200 text-sm flex items-center gap-2 transition-all">
                                    <i class="fa-solid fa-car"></i> Transport
                                </button>
                                <button onclick="selectCategory('housing', this)" class="category-chip px-4 py-2 rounded-xl border border-slate-200 text-sm flex items-center gap-2 transition-all">
                                    <i class="fa-solid fa-bed"></i> Stay
                                </button>
                                <button onclick="selectCategory('fun', this)" class="category-chip px-4 py-2 rounded-xl border border-slate-200 text-sm flex items-center gap-2 transition-all">
                                    <i class="fa-solid fa-ticket"></i> Entertainment
                                </button>
                            </div>
                        </div>

                        <button onclick="addExpense()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-semibold hover:bg-slate-800 transition-all shadow-lg active:scale-[0.98]">
                            Add Expense
                        </button>
                    </div>
                </section>

                <!-- History Card -->
                <section class="glass-card p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4">Recent Expenses</h2>
                    <div id="expenseHistory" class="space-y-3 max-h-80 overflow-y-auto pr-2 custom-scrollbar">
                        <p class="text-center text-slate-400 py-8 italic">No expenses recorded yet.</p>
                    </div>
                </section>
            </div>

            <!-- Right Column: Results & Balances -->
            <div class="lg:col-span-5 space-y-6">
                
                <!-- Balances Card -->
                <section class="bg-indigo-600 text-white p-6 rounded-2xl shadow-xl shadow-indigo-200">
                    <h2 class="text-xl font-bold mb-6">Group Balances</h2>
                    <div id="balanceList" class="space-y-4">
                        <p class="opacity-75 italic">Add participants to see balances.</p>
                    </div>
                </section>

                <!-- Settle Up Suggestions -->
                <section class="glass-card p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-semibold mb-4 text-indigo-900 flex justify-between items-center">
                        Suggested Payments
                        <span class="text-xs font-normal text-slate-500 uppercase tracking-widest">Optimized</span>
                    </h2>
                    <div id="settleUpList" class="space-y-3">
                        <!-- Suggested payments go here -->
                    </div>
                </section>

                <!-- Stats card -->
                <section class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-2xl border border-slate-200">
                        <p class="text-xs font-medium text-slate-500 uppercase">Total Spent</p>
                        <p class="text-2xl font-bold text-slate-900" id="totalSpent">$0.00</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200">
                        <p class="text-xs font-medium text-slate-500 uppercase">Avg / Person</p>
                        <p class="text-2xl font-bold text-slate-900" id="avgSpent">$0.00</p>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <!-- Feedback Message Box -->
    <div id="msgBox" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none z-50">
        Message goes here
    </div>

    <script>
        let participants = [];
        let expenses = [];
        let selectedCategory = 'food';

        const categoryIcons = {
            food: 'fa-utensils',
            transport: 'fa-car',
            housing: 'fa-bed',
            fun: 'fa-ticket'
        };

        // Initialize from local storage if available
        window.onload = () => {
            const savedData = localStorage.getItem('splitshare_data');
            if (savedData) {
                const data = JSON.parse(savedData);
                participants = data.participants || [];
                expenses = data.expenses || [];
                updateUI();
            }
        };

        function showMessage(text) {
            const box = document.getElementById('msgBox');
            box.innerText = text;
            box.classList.remove('opacity-0');
            setTimeout(() => box.classList.add('opacity-0'), 3000);
        }

        function addParticipant() {
            const input = document.getElementById('personName');
            const name = input.value.trim();
            
            if (!name) return;
            if (participants.includes(name)) {
                showMessage("Name already exists!");
                return;
            }

            participants.push(name);
            input.value = '';
            updateUI();
            showMessage(`Added ${name}`);
        }

        function removeParticipant(name) {
            if (expenses.some(e => e.payer === name)) {
                showMessage("Cannot remove person with existing expenses!");
                return;
            }
            participants = participants.filter(p => p !== name);
            updateUI();
        }

        function selectCategory(cat, el) {
            selectedCategory = cat;
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function addExpense() {
            const desc = document.getElementById('expenseDesc').value.trim();
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            const payer = document.getElementById('payerSelect').value;

            if (!desc || isNaN(amount) || amount <= 0 || !payer) {
                showMessage("Please fill in all fields correctly.");
                return;
            }

            if (participants.length < 2) {
                showMessage("Need at least 2 participants.");
                return;
            }

            const newExpense = {
                id: Date.now(),
                description: desc,
                amount: amount,
                payer: payer,
                category: selectedCategory,
                date: new Date().toLocaleDateString()
            };

            expenses.push(newExpense);
            
            // Clear inputs
            document.getElementById('expenseDesc').value = '';
            document.getElementById('expenseAmount').value = '';
            
            saveData();
            updateUI();
            showMessage("Expense added!");
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            saveData();
            updateUI();
        }

        function saveData() {
            localStorage.setItem('splitshare_data', JSON.stringify({ participants, expenses }));
        }

        function resetData() {
            if (confirm("Clear all data?")) {
                participants = [];
                expenses = [];
                saveData();
                updateUI();
            }
        }

        function updateUI() {
            renderParticipants();
            renderPayerSelect();
            renderExpenseHistory();
            renderBalances();
            calculateStats();
        }

        function renderParticipants() {
            const list = document.getElementById('participantList');
            list.innerHTML = participants.map(p => `
                <div class="flex items-center bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-full text-sm font-semibold group">
                    ${p}
                    <button onclick="removeParticipant('${p}')" class="ml-2 text-indigo-300 hover:text-red-500 transition-colors">
                        <i class="fa-solid fa-circle-xmark"></i>
                    </button>
                </div>
            `).join('');
        }

        function renderPayerSelect() {
            const select = document.getElementById('payerSelect');
            const currentVal = select.value;
            select.innerHTML = '<option value="">Select person</option>' + 
                participants.map(p => `<option value="${p}" ${p === currentVal ? 'selected' : ''}>${p}</option>`).join('');
        }

        function renderExpenseHistory() {
            const container = document.getElementById('expenseHistory');
            if (expenses.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-400 py-8 italic">No expenses recorded yet.</p>';
                return;
            }

            container.innerHTML = expenses.slice().reverse().map(e => `
                <div class="flex items-center justify-between p-4 bg-white rounded-xl border border-slate-100 hover:border-indigo-200 transition-all group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-500">
                            <i class="fa-solid ${categoryIcons[e.category] || 'fa-receipt'}"></i>
                        </div>
                        <div>
                            <p class="font-semibold text-slate-800">${e.description}</p>
                            <p class="text-xs text-slate-400">${e.payer} paid • ${e.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-bold text-slate-900">$${e.amount.toFixed(2)}</span>
                        <button onclick="deleteExpense(${e.id})" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-red-500 transition-all">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function calculateStats() {
            const total = expenses.reduce((sum, e) => sum + e.amount, 0);
            document.getElementById('totalSpent').innerText = `$${total.toFixed(2)}`;
            const avg = participants.length ? total / participants.length : 0;
            document.getElementById('avgSpent').innerText = `$${avg.toFixed(2)}`;
        }

        function renderBalances() {
            const balances = {};
            participants.forEach(p => balances[p] = 0);

            // Logic: Payer gets +, everyone else gets - (amount / num_people)
            expenses.forEach(e => {
                const share = e.amount / participants.length;
                participants.forEach(p => {
                    if (p === e.payer) {
                        balances[p] += (e.amount - share);
                    } else {
                        balances[p] -= share;
                    }
                });
            });

            const balanceList = document.getElementById('balanceList');
            if (participants.length === 0) {
                balanceList.innerHTML = '<p class="opacity-75 italic text-sm">Add participants to see balances.</p>';
                return;
            }

            balanceList.innerHTML = participants.map(p => {
                const bal = balances[p];
                const isPositive = bal >= -0.01;
                return `
                    <div class="flex justify-between items-center">
                        <span class="font-medium">${p}</span>
                        <span class="font-bold ${isPositive ? 'text-green-300' : 'text-red-200'}">
                            ${bal >= 0 ? '+' : '-'}$${Math.abs(bal).toFixed(2)}
                        </span>
                    </div>
                `;
            }).join('');

            renderSettlement(balances);
        }

        /**
         * Smart Settlement Algorithm: Minimize number of transactions
         */
        function renderSettlement(balances) {
            const debtors = [];
            const creditors = [];

            for (let person in balances) {
                if (balances[person] < -0.01) {
                    debtors.push({ name: person, amount: Math.abs(balances[person]) });
                } else if (balances[person] > 0.01) {
                    creditors.push({ name: person, amount: balances[person] });
                }
            }

            const transactions = [];
            let d = 0, c = 0;

            while (d < debtors.length && c < creditors.length) {
                const payment = Math.min(debtors[d].amount, creditors[c].amount);
                
                transactions.push({
                    from: debtors[d].name,
                    to: creditors[c].name,
                    amount: payment
                });

                debtors[d].amount -= payment;
                creditors[c].amount -= payment;

                if (debtors[d].amount < 0.01) d++;
                if (creditors[c].amount < 0.01) c++;
            }

            const settleContainer = document.getElementById('settleUpList');
            if (transactions.length === 0) {
                settleContainer.innerHTML = '<p class="text-center text-slate-400 py-4 text-sm">Everyone is even!</p>';
                return;
            }

            settleContainer.innerHTML = transactions.map(t => `
                <div class="flex items-center justify-between p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <div class="text-sm">
                        <span class="font-bold text-indigo-600">${t.from}</span>
                        <span class="text-slate-400 mx-1">pays</span>
                        <span class="font-bold text-indigo-600">${t.to}</span>
                    </div>
                    <div class="font-bold text-slate-900">
                        $${t.amount.toFixed(2)}
                    </div>
                </div>
            `).join('');
        }

    </script>
</body>
</html>
