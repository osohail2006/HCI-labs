<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCI Lab 06 | Cognitive Maze Runner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Helper to render Lucide Icons in a CDN environment
        const LucideIcon = ({ name, className = "w-6 h-6" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [screen, setScreen] = useState('start');
            const [method, setMethod] = useState(null);
            const [time, setTime] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [mouseStep, setMouseStep] = useState(0);
            const [kbStep, setKbStep] = useState(0);
            const [prediction, setPrediction] = useState('--');
            const [brainLoad, setBrainLoad] = useState(20);
            
            const timerRef = useRef(null);
            const startTimeRef = useRef(null);

            const KLM_PREDICTIONS = { MOUSE: 3.75, KEYBOARD: 2.03 };

            useEffect(() => {
                if (isActive) {
                    startTimeRef.current = performance.now();
                    timerRef.current = setInterval(() => {
                        const elapsed = (performance.now() - startTimeRef.current) / 1000;
                        setTime(elapsed);
                        setBrainLoad(prev => Math.min(95, 20 + elapsed * 10));
                    }, 10);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isActive]);

            const handleStart = (m) => {
                setMethod(m);
                setPrediction(KLM_PREDICTIONS[m] + 's');
                setScreen(m.toLowerCase());
                setTime(0);
                setIsActive(true);
                setMouseStep(0);
                setKbStep(0);
            };

            const handleComplete = () => {
                setIsActive(false);
                setScreen('results');
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (screen !== 'keyboard') return;
                    if (e.altKey && kbStep === 0) setKbStep(1);
                    if (e.key === '7' && kbStep === 1) {
                        setKbStep(2);
                        setTimeout(handleComplete, 300);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [screen, kbStep]);

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6">
                    <div className="w-full max-w-2xl space-y-6">
                        {/* Header */}
                        <div className="glass p-6 rounded-[2rem] flex justify-between items-center shadow-2xl">
                            <div>
                                <h1 className="text-lg font-extrabold uppercase tracking-tighter text-blue-400">Cognitive Maze Runner</h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase">UBIT Lab 06 • GOMS Analysis</p>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] uppercase font-bold text-slate-500">Live τm</p>
                                <p className="text-2xl font-mono font-bold text-white">{time.toFixed(2)}s</p>
                            </div>
                        </div>

                        {/* Main Interaction Area */}
                        <main className="glass p-8 rounded-[3rem] min-h-[400px] flex flex-col justify-center text-center">
                            {screen === 'start' && (
                                <div className="space-y-8 animate-in fade-in duration-500">
                                    <h2 className="text-2xl font-bold italic">Select Execution Method</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={() => handleStart('MOUSE')} className="glass p-8 rounded-3xl hover:bg-blue-600/20 transition-all flex flex-col items-center gap-3">
                                            <LucideIcon name="mouse-pointer-2" className="text-blue-400" />
                                            <span className="font-bold">Mouse (P)</span>
                                        </button>
                                        <button onClick={() => handleStart('KEYBOARD')} className="glass p-8 rounded-3xl hover:bg-emerald-600/20 transition-all flex flex-col items-center gap-3">
                                            <LucideIcon name="keyboard" className="text-emerald-400" />
                                            <span className="font-bold">Keyboard (K)</span>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {screen === 'mouse' && (
                                <div className="space-y-4">
                                    <p className="text-xs font-mono text-slate-500 uppercase mb-4">Click sequence to execute L7</p>
                                    {mouseStep === 0 && <button onClick={() => setMouseStep(1)} className="w-full glass p-6 rounded-2xl hover:border-blue-500 transition-all flex justify-between items-center"><span>1. Open Root</span> <LucideIcon name="chevron-right" /></button>}
                                    {mouseStep === 1 && <button onClick={() => setMouseStep(2)} className="w-full glass p-6 rounded-2xl hover:border-blue-500 transition-all flex justify-between items-center"><span>2. Select Terminal</span> <LucideIcon name="chevron-right" /></button>}
                                    {mouseStep === 2 && <button onClick={handleComplete} className="w-full bg-emerald-600/20 border border-emerald-500 p-6 rounded-2xl text-emerald-400 font-bold flex justify-between items-center animate-pulse"><span>3. EXECUTE_L7</span> <LucideIcon name="zap" /></button>}
                                </div>
                            )}

                            {screen === 'keyboard' && (
                                <div className="space-y-8">
                                    <h2 className="text-slate-500 font-bold uppercase tracking-widest text-sm">Expert Protocol</h2>
                                    <div className="flex justify-center gap-4 text-3xl font-black">
                                        <div className={`w-20 h-20 flex items-center justify-center rounded-2xl border-2 transition-all ${kbStep >= 1 ? 'bg-blue-600 border-blue-400' : 'border-white/10 text-slate-700'}`}>ALT</div>
                                        <div className="flex items-center">+</div>
                                        <div className={`w-20 h-20 flex items-center justify-center rounded-2xl border-2 transition-all ${kbStep === 2 ? 'bg-emerald-600 border-emerald-400' : 'border-white/10 text-slate-700'}`}>7</div>
                                    </div>
                                    <p className="text-xs text-slate-500 animate-pulse font-mono">Hold ALT and press '7'</p>
                                </div>
                            )}

                            {screen === 'results' && (
                                <div className="space-y-6 animate-in slide-in-from-bottom-5 duration-700">
                                    <div className="flex justify-center"><LucideIcon name="check-circle-2" className="text-emerald-400 w-12 h-12" /></div>
                                    <h2 className="text-3xl font-black">Performance Audit</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white/5 p-4 rounded-2xl">
                                            <p className="text-[10px] uppercase font-bold text-slate-500">Actual Time</p>
                                            <p className="text-3xl font-mono font-bold text-white">{time.toFixed(2)}s</p>
                                        </div>
                                        <div className="bg-white/5 p-4 rounded-2xl">
                                            <p className="text-[10px] uppercase font-bold text-slate-500">KLM Goal</p>
                                            <p className="text-3xl font-mono font-bold text-slate-500">{KLM_PREDICTIONS[method]}s</p>
                                        </div>
                                    </div>
                                    <button onClick={() => location.reload()} className="w-full bg-white text-slate-900 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-400 hover:text-white transition-all">Restart Experiment</button>
                                </div>
                            )}
                        </main>

                        <footer className="text-center text-[9px] text-slate-600 font-bold tracking-[0.4em] uppercase">
                            Model Human Processor • Card, Moran, & Newell (1983)
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
